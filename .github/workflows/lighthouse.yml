# Runs Google's Lighthouse against a production `next start` server (not static
# export). Tune thresholds in `lighthouserc.json`.
#
# Blocking production: this workflow does not stop Vercel by itself. To require a
# green Lighthouse run before code reaches `main`, enable branch protection:
# Repository → Settings → Branches → Add rule (or edit) for `main` → require
# status checks → select the check named for this job (e.g. "Lighthouse audit").
# Optional: require the same check for Vercel’s GitHub integration if you merge
# via PR only.

name: Lighthouse compliance

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
